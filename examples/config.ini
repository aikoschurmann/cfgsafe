service_name = edge-gateway
bind_address = 127.0.0.1
listen_port = 9999
enable_tls = false

[database]
driver = postgres
host = db.local
port = 5432
pool_size = 20

[auth]
enabled = true
provider = jwt
token_ttl = 7200

[logging]
level = info
file_path = /tmp/gateway.log
max_backups = 10

[caching]
enabled = true
nodes = cache-1.local,cache-2.local
ttl = 600
